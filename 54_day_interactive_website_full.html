header{padding:20px}
h1{margin:0; color:var(--accent); font-size:28px}
p{opacity:.9}
.container{max-width:900px; margin:auto}
.controls{display:flex; justify-content:center; gap:10px; margin:10px}

}

button.locked{background:#9aa0a6; cursor:not-allowed; opacity:.7}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:8px; padding:10px}
.card{
  margin:16px auto; padding:16px; max-width:520px;
  background:var(--card); border-radius:20px; display:none;
  box-shadow:0 10px 24px rgba(0,0,0,.15);
  animation:pop .3s ease;
}
@keyframes pop{from{transform:scale(.9); opacity:0} to{transform:scale(1); opacity:1}}
.pet{
  position:fixed; bottom:20px; right:20px; font-size:42px; cursor:pointer;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.heart{

}
@keyframes rise{from{transform:translateY(0); opacity:1}to{transform:translateY(-120px); opacity:0}}
.footer{opacity:.7; font-size:14px; margin:20px}
.progress{margin-top:8px}
.toggle{background:#00000022}

const messageBox = document.getElementById("message");
const info = document.getElementById("info");
const progress = document.getElementById("progress");

progress.innerText = `Opened: ${diffDays+1} / ${totalDays} days`;

}
